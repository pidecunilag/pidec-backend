services:
  - type: web
    name: pidec-api
    env: node
    buildCommand: NODE_ENV=development pnpm install && pnpm run build:shared && cd apps/api && pnpm run build
    startCommand: cd apps/api && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      # Important: Define all these secrets in your Render Dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AUTH_ACCESS_TOKEN_SECRET
        sync: false
      - key: AUTH_REFRESH_TOKEN_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
